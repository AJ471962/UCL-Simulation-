<!DOCTYPE html>
<html>
<head>
  <title>UCL Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>UCL Simulator</h1>

  <!-- MAIN ACTIONS -->
  <button onclick="generateDraw()">Generate League Phase Draw</button>
  <button onclick="calculateTable()">Update Standings</button>

  <!-- OPTIONAL ACTION (only if you implement it in JS) -->
  <button onclick="alert('Auto-fill not enabled in current script')">
    Simulate Matchday (Auto)
  </button>

  <hr>

  <!-- TEAM EDITOR -->
  <h2>Team Editor</h2>
  <div id="teamEditor"></div>

  <hr>

  <!-- FIXTURES -->
  <h2>Fixtures</h2>
  <div id="fixtures"></div>

  <hr>

  <!-- RESULTS INFO -->
  <h2>Enter Results</h2>
  <p>Fill scores in fixtures then press "Update Standings"</p>

  <div id="resultsBox"></div>

  <hr>

  <!-- STANDINGS -->
  <h2>Standings</h2>
  <div id="standings"></div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
